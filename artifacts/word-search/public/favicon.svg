<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="hl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <rect x="2" y="2" width="176" height="176" rx="38" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>

  <g opacity="0.32" font-family="'Outfit', system-ui, sans-serif" font-weight="700" font-size="30" text-anchor="middle" fill="#ffffff">
    <text x="45" y="68">A</text>
    <text x="90" y="68">K</text>
    <text x="135" y="68">P</text>

    <text x="45" y="113">M</text>
    <text x="90" y="113">T</text>
    <text x="135" y="113">E</text>

    <text x="45" y="158">L</text>
    <text x="90" y="158">R</text>
    <text x="135" y="158">Z</text>
  </g>

  <g filter="url(#shadow)">
    <path d="M 45 58 L 135 148"
          stroke="url(#hl)" stroke-width="40" stroke-linecap="round" fill="none" opacity="0.95"/>
  </g>

  <g font-family="'Outfit', system-ui, sans-serif" font-weight="900" font-size="34" text-anchor="middle" fill="#1f1147">
    <text x="45" y="70">W</text>
    <text x="90" y="115">O</text>
    <text x="135" y="160">W</text>
  </g>
</svg>
