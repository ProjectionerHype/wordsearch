kind = "web"
previewPath = "/"
title = "Word Search"
version = "1.0.0"
id = "artifacts/word-search"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23385

[services.development]
run = "pnpm --filter @workspace/word-search run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/word-search", "run", "build" ]
publicDir = "artifacts/word-search/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23385"
BASE_PATH = "/"
